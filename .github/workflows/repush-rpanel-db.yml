# Emergency bootstrap for rpanel-db:latest
# Run manually (workflow_dispatch) from GitHub Actions whenever rpanel-db:latest
# is missing from GHCR. No service containers — pure build + push, no dependencies.
# After this completes successfully, the main build pipeline will unblock.

name: Bootstrap rpanel-db

on:
  workflow_dispatch:
    inputs:
      also_tag_version:
        required: false
        type: string
        default: ''
        description: "Optional extra version tag (e.g. 2.5.4). Always pushes :latest."

jobs:
  bootstrap-db:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MONOREPO_PAT || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push rpanel-db
        uses: docker/build-push-action@v4
        with:
          context: platform
          file: platform/postgres.Dockerfile
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/rpanel-db:latest
            ${{ inputs.also_tag_version != '' && format('ghcr.io/rokctai/monorepo/rpanel-db:{0}', inputs.also_tag_version) || 'ghcr.io/rokctai/monorepo/rpanel-db:latest' }}

      - name: Verify
        run: |
          docker pull ghcr.io/rokctai/monorepo/rpanel-db:latest
          echo "✅ rpanel-db:latest is live — main pipeline is now unblocked"
