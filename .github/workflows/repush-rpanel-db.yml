# Emergency re-tag of rpanel-db:latest
# Run manually when rpanel-db:latest is missing from GHCR.
# Pulls an existing versioned tag and re-pushes it as :latest — no build needed.

name: Bootstrap rpanel-db

on:
  workflow_dispatch:
    inputs:
      source_tag:
        required: false
        type: string
        default: '2.5.4'
        description: "Existing versioned tag to re-tag as :latest (e.g. 2.5.4)"

jobs:
  bootstrap-db:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MONOREPO_PAT || github.token }}

      - name: Retag existing version as :latest
        run: |
          SOURCE="ghcr.io/rokctai/monorepo/rpanel-db:${{ inputs.source_tag }}"
          TARGET="ghcr.io/rokctai/monorepo/rpanel-db:latest"
          echo "Pulling $SOURCE..."
          docker pull "$SOURCE"
          echo "Retagging as $TARGET..."
          docker tag "$SOURCE" "$TARGET"
          docker push "$TARGET"
          echo "✅ rpanel-db:latest is live — main pipeline is now unblocked"
