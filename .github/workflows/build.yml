name: Build (Smart)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIP_BREAK_SYSTEM_PACKAGES: 1
  NODE_OPTIONS: "--no-deprecation"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
  schedule:
    - cron: '0 2 * * 0' # Every Sunday at 2 AM UTC
  workflow_dispatch:
    inputs:
      backfill_ai_notes_cutoff_version:
        type: string
        default: ""
        description: "Regenerate AI release notes starting from this version (use 'all' for full history)"

      build-type:
        description: 'Build Type (apk/appbundle) - Ignored for Node'
        required: true
        default: 'apk'
        type: choice
        options:
        - apk
        - appbundle
      node-version:
        type: string
        default: '24'
      python-version:
        type: string
        default: '3.14.2'
      mariadb-version:
        type: string
        default: '10.6'
      postgres-version:
        type: string
        default: '16'
      install-rpanel:
        type: boolean
        default: false
      db-type:
        type: string
        default: 'postgres'
      version_format:
        type: string
        default: '##.##.#'
        description: "Format for version bumping (e.g. ##.##.## or ##.##.#)"

jobs:
  # --- 1. DETECT PROJECT TYPE & UPSTREAM UPDATES ---
  detect:
    runs-on: ubuntu-latest
    container: python:3.14-slim
    outputs:
      is_flutter: ${{ steps.check.outputs.is_flutter }}
      is_node: ${{ steps.check.outputs.is_node }}
      should_build: ${{ steps.upstream_check.outputs.should_build }}
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git curl jq
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/checkout@v4
      
      - name: Check Upstream Updates (Cron Only)
        id: upstream_check
        env:
          GITHUB_TOKEN: ${{ secrets.MONOREPO_PAT || secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import os, json, urllib.request, base64

          token = os.environ.get('GITHUB_TOKEN')
          headers = {'Accept': 'application/vnd.github.v3+json'}
          if token: headers['Authorization'] = f'token {token}'

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read().decode())
              except Exception as e:
                  print(f'Error fetching {url}: {e}')
                  return None

          mv_data = fetch('https://api.github.com/repos/RokctAI/control/contents/control/control/major_versions.json')
          if not mv_data:
              print('Failed to fetch major_versions.json. Forcing build.')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f: f.write('should_build=true\n')
              exit(0)

          mv_json = json.loads(base64.b64decode(mv_data['content']).decode())

          local_state = {}
          if os.path.exists('build_state.json'):
              with open('build_state.json', 'r') as f:
                  local_state = json.load(f)

          should_build = False
          if os.environ.get('GITHUB_EVENT_NAME') != 'schedule':
              should_build = True

          for app, config in mv_json.items():
              repo = f\"{config.get('owner')}/{app}\"
              if 'rok' in repo.lower() and 'rokct' not in repo.lower(): continue
              
              branch = config.get('branch')
              current_val = None
              
              if branch:
                  print(f'Checking latest commit on {repo}:{branch}...')
                  res = fetch(f'https://api.github.com/repos/{repo}/commits/{branch}')
                  if res and 'sha' in res: current_val = res['sha']
              else:
                  print(f'Checking latest tag on {repo}...')
                  res = fetch(f'https://api.github.com/repos/{repo}/tags')
                  if res and len(res) > 0 and 'name' in res[0]: current_val = res[0]['name']
                      
              if current_val and local_state.get(repo) != current_val:
                  print(f'-> UPDATE DETECTED for {repo}! Local: {local_state.get(repo)} Remote: {current_val}')
                  should_build = True

          print('Checking PlatformStack...')
          res = fetch('https://api.github.com/repos/RokctAI/PlatformStack/commits/main')
          if res and 'sha' in res and local_state.get('RokctAI/PlatformStack') != res['sha']:
              print('-> UPDATE DETECTED for PlatformStack!')
              should_build = True

          print('Checking Control Repo...')
          res = fetch('https://api.github.com/repos/RokctAI/control/commits/main')
          if res and 'sha' in res and local_state.get('RokctAI/control') != res['sha']:
              print('-> UPDATE DETECTED for Control!')
              should_build = True

          with open('build_result.txt', 'w') as f:
              f.write(str(should_build).lower())
          "
          
          # Read the python output file and pass it safely to GitHub Actions
          RES=$(cat build_result.txt)
          echo "should_build=$RES" >> "$GITHUB_OUTPUT"
          
          if [ "$RES" = "false" ]; then
            echo "No upstream updates found in the last 7 days. Pipeline will safely skip."
          fi

      - name: Check Project Type
        id: check
        if: steps.upstream_check.outputs.should_build == 'true'
        run: |
          if [ -f "pubspec.yaml" ]; then
             echo "Flutter project detected."
             echo "is_flutter=true" >> "$GITHUB_OUTPUT"
             echo "is_node=false" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
             echo "Node.js project detected."
             echo "is_flutter=false" >> "$GITHUB_OUTPUT"
             echo "is_node=true" >> "$GITHUB_OUTPUT"
          else
             echo "Unknown project type. Assuming Frappe."
             echo "is_flutter=false" >> "$GITHUB_OUTPUT"
             echo "is_node=false" >> "$GITHUB_OUTPUT"
          fi

  # --- 2. UNIFIED PIPELINE (Smart) ---
  pipeline:
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    uses: RokctAI/shared-workflows/.github/workflows/universal-pipeline.yml@main
    with:
      backfill_ai_notes_cutoff_version: ${{ inputs.backfill_ai_notes_cutoff_version }}
      project_type: ${{ needs.detect.outputs.is_flutter == 'true' && 'flutter' || (needs.detect.outputs.is_node == 'true' && 'node' || 'frappe') }}
      install-rpanel: true
      install-erpnext: true
      install-payments: true
      # Quality Gate Toggles
      run_security: true
      run_lint: true
      run_ci: false
      # Deployment Configuration (Immediate release on Main)
      release_strategy: 'weekly'
      # Environment configuration
      node-version: ${{ inputs.node-version || '24' }}
      python-version: ${{ inputs.python-version || '3.14.2' }}
      mariadb-version: ${{ inputs.mariadb-version || '10.6' }}
      postgres-version: ${{ inputs.postgres-version || '16' }}
      db-type: 'postgres'
      version_format: ${{ inputs.version_format || '##.##.##' }}
      bootstrap: true
      # --- Credentials ---
      # For Golden Seed generation: Ensures CI DB password matches Monorepo .env/production.env
    secrets: inherit

  docker-release:
    needs: pipeline
    if: success() && startsWith(github.repository, 'RokctAI/')
    runs-on: ubuntu-latest
    permissions: write-all
    services:
      db:
        image: ghcr.io/rokctai/monorepo/rpanel-db:latest
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.MONOREPO_PAT }}
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: admin
          POSTGRES_USER: postgres
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git rsync
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
           path: docker-context

      - name: Checkout Monorepo for Overrides
        if: github.repository_owner == 'RokctAI'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: RokctAI/Monorepo
          path: docker-context/monorepo_overrides
          token: ${{ secrets.MONOREPO_PAT || github.token }}

      - name: Checkout Gravity Repository
        if: github.repository_owner == 'RokctAI'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: RokctAI/gravity
          path: docker-context/gravity
          token: ${{ secrets.MONOREPO_PAT || github.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MONOREPO_PAT }}

      - name: Build Context Staging
        run: |
          # Copy the current repository's code (the code being tested) into the docker context
          # Exclude the docker-context folder itself to avoid recursion
          rsync -a --exclude 'docker-context' . ./docker-context/current_repo/

      - name: Extract Version
        id: meta
        run: |
          if [ -f "docker-context/version.json" ]; then
            VERSION=$(grep -E '"(platform|rpanel)"' docker-context/version.json | head -n 1 | cut -d'"' -f4)
          elif [ -f "docker-context/rpanel/versions.json" ]; then
            VERSION=$(grep '"rpanel"' docker-context/rpanel/versions.json | cut -d'"' -f4)
          else
            VERSION=$(grep "__version__" docker-context/rpanel/__init__.py | cut -d'"' -f2)
          fi
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version!"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extract version: $VERSION"

      - name: Confirm Database Readiness
        run: |
          timeout 30s bash -c "until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do echo 'Waiting for PostgreSQL...'; sleep 2; done"

      - name: Build and Push Control Hub (Full)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/platform/Dockerfile
          target: full
          network: host
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/rpanel-control:latest
            ghcr.io/rokctai/monorepo/rpanel-control:${{ steps.meta.outputs.version }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.MONOREPO_PAT || github.token }}
            MONOREPO_PAT=${{ secrets.MONOREPO_PAT }}
            IS_ROKCTAI_REPO=${{ github.repository_owner == 'RokctAI' && 'true' || 'false' }}
            DB_HOST=127.0.0.1

      - name: Build and Push Tenant Spoke (Tenant)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/platform/Dockerfile
          target: tenant
          network: host
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/rpanel-tenant:latest
            ghcr.io/rokctai/monorepo/rpanel-tenant:${{ steps.meta.outputs.version }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.MONOREPO_PAT || github.token }}
            MONOREPO_PAT=${{ secrets.MONOREPO_PAT }}
            IS_ROKCTAI_REPO=${{ github.repository_owner == 'RokctAI' && 'true' || 'false' }}
            DB_HOST=127.0.0.1

      - name: Build and Push Drone Brain (Frappe)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/platform/Dockerfile
          target: iot
          network: host
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/drone-brain:latest
            ghcr.io/rokctai/monorepo/drone-brain:${{ steps.meta.outputs.version }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.MONOREPO_PAT || github.token }}
            MONOREPO_PAT=${{ secrets.MONOREPO_PAT }}
            IS_ROKCTAI_REPO=${{ github.repository_owner == 'RokctAI' && 'true' || 'false' }}
            DB_HOST=127.0.0.1

      - name: Build and Push Drone Edge (Go)
        uses: docker/build-push-action@v4
        with:
          context: docker-context/monorepo_overrides/IoT
          file: docker-context/monorepo_overrides/IoT/Dockerfile
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/drone-edge:latest
            ghcr.io/rokctai/monorepo/drone-edge:${{ steps.meta.outputs.version }}

      - name: Build and Push Postgres (Custom)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/platform/postgres.Dockerfile
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/rpanel-db:latest
            ghcr.io/rokctai/monorepo/rpanel-db:${{ steps.meta.outputs.version }}

      - name: Build and Push Gravity
        uses: docker/build-push-action@v4
        with:
          context: docker-context/gravity
          file: docker-context/gravity/Dockerfile
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/gravity:latest
            ghcr.io/rokctai/monorepo/gravity:${{ steps.meta.outputs.version }}

  upgrade-test:
    needs: [pipeline, docker-release]
    uses: RokctAI/shared-workflows/.github/workflows/universal-upgrade-test.yml@main
    with:
      current_version: ${{ needs.docker-release.outputs.version }}
      min_legacy_version: '2.4.8'
    secrets: inherit

  rollback-images:
    needs: [docker-release, upgrade-test]
    # Only run if images were pushed successfully BUT the upgrade test failed
    if: always() && needs.docker-release.result == 'success' && needs.upgrade-test.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Failed Images from GHCR
        run: |
          VERSION="${{ needs.docker-release.outputs.version }}"
          echo "Rolling back failed version: $VERSION"

          # URL encoded package names.
          # NOTE: rpanel-db is intentionally excluded — it is a shared infrastructure image
          # (Postgres + extensions). It does not change with app code and should never be
          # rolled back. Excluding it ensures rpanel-db:latest always stays valid.
          PACKAGES=("monorepo%2Frpanel-control" "monorepo%2Frpanel-tenant" "monorepo%2Fdrone-brain" "monorepo%2Fdrone-edge")

          for PKG in "${PACKAGES[@]}"; do
            echo "Looking up version ID for $PKG tag $VERSION..."
            VERSION_ID=$(curl -s -H "Authorization: token ${{ secrets.MONOREPO_PAT }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/orgs/RokctAI/packages/container/$PKG/versions" \
              | jq -r ".[] | select(.metadata.container.tags[]? == \"$VERSION\") | .id" | head -n 1)

            if [ -n "$VERSION_ID" ] && [ "$VERSION_ID" != "null" ]; then
              echo "Found ID $VERSION_ID. Issuing delete request..."
              RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE -H "Authorization: token ${{ secrets.MONOREPO_PAT }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/orgs/RokctAI/packages/container/$PKG/versions/$VERSION_ID")
              echo "Delete response code: $RESPONSE"
            else
              echo "Could not find tag $VERSION for package $PKG. It may have already been deleted or not pushed."
            fi
          done

      - name: Restore Previous Version as Latest
        run: |
          echo "${{ secrets.MONOREPO_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          # Restore :latest for app images only by pulling the previous semver tag and
          # re-pushing it as :latest. The GitHub API PATCH on container version metadata
          # does not reliably update GHCR tags — docker pull+retag+push is the safe method.
          #
          # NOTE: rpanel-db is intentionally excluded (see Delete step above).
          PACKAGES=("rpanel-control" "rpanel-tenant" "drone-brain" "drone-edge")
          REGISTRY="ghcr.io/rokctai/monorepo"
          ORG_NAME=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          for PKG in "${PACKAGES[@]}"; do
            echo "Restoring :latest for $PKG..."

            # Find the most recent remaining semver tag (excluding 'latest') via the API
            PREV_TAG=$(curl -s -H "Authorization: token ${{ secrets.MONOREPO_PAT }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/orgs/$ORG_NAME/packages/container/monorepo%2F$PKG/versions" \
              | jq -r '[.[] | select(.metadata.container.tags[] | test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] | .[0].metadata.container.tags[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))' \
              | head -n 1)

            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "null" ]; then
              echo "Re-tagging $REGISTRY/$PKG:$PREV_TAG as :latest..."
              docker pull "$REGISTRY/$PKG:$PREV_TAG"
              docker tag  "$REGISTRY/$PKG:$PREV_TAG" "$REGISTRY/$PKG:latest"
              docker push "$REGISTRY/$PKG:latest"
              echo "✅ $PKG:latest restored from $PREV_TAG"
            else
              echo "⚠️ No semver tag found for $PKG — cannot restore :latest"
            fi
          done

  bump-version:
    needs: [docker-release, upgrade-test]
    if: always() && needs.docker-release.result == 'success' && (needs.upgrade-test.result == 'success' || needs.upgrade-test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MONOREPO_PAT || github.token }}
          
      - name: Auto-Bump Version & Save Build State
        env:
          GITHUB_TOKEN: ${{ secrets.MONOREPO_PAT || github.token }}
        run: |
          python3 -c "
          import json, urllib.request, base64, os
          
          # 1. Bump Version
          with open('version.json', 'r') as f:
              data = json.load(f)
          v = data.get('platform')
          if v:
              parts = v.split('.')
              parts[-1] = str(int(parts[-1]) + 1)
              data['platform'] = '.'.join(parts)
              with open('version.json', 'w') as f:
                  json.dump(data, f, indent=4)
                  f.write('\n')

          # 2. Re-fetch and save new Build State
          token = os.environ.get('GITHUB_TOKEN')
          headers = {'Accept': 'application/vnd.github.v3+json'}
          if token: headers['Authorization'] = f'token {token}'

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read().decode())
              except: return None

          new_state = {}
          mv_data = fetch('https://api.github.com/repos/RokctAI/control/contents/control/control/major_versions.json')
          if mv_data:
              mv_json = json.loads(base64.b64decode(mv_data['content']).decode())
              for app, config in mv_json.items():
                  repo = f\"{config.get('owner')}/{app}\"
                  if 'rok' in repo.lower() and 'rokct' not in repo.lower(): continue
                  branch = config.get('branch')
                  if branch:
                      res = fetch(f'https://api.github.com/repos/{repo}/commits/{branch}')
                      if res and 'sha' in res: new_state[repo] = res['sha']
                  else:
                      res = fetch(f'https://api.github.com/repos/{repo}/tags')
                      if res and len(res) > 0 and 'name' in res[0]: new_state[repo] = res[0]['name']

          res = fetch('https://api.github.com/repos/RokctAI/PlatformStack/commits/main')
          if res and 'sha' in res: new_state['RokctAI/PlatformStack'] = res['sha']

          res = fetch('https://api.github.com/repos/RokctAI/control/commits/main')
          if res and 'sha' in res: new_state['RokctAI/control'] = res['sha']

          with open('build_state.json', 'w') as f:
              json.dump(new_state, f, indent=4)
              f.write('\n')
          "
          
          git config --global user.name "rokctbot[bot]"
          git config --global user.email "rokctbot[bot]@users.noreply.github.com"
          git add version.json build_state.json
          git commit -m "chore: auto-bump version and update build state [skip ci]" || echo "No changes to commit"
          git push origin "HEAD:${GITHUB_REF#refs/}"

      - name: Trigger Frontend Schema Sync (Repository Dispatch)
        env:
          MONOREPO_PAT: ${{ secrets.MONOREPO_PAT || secrets.GITHUB_TOKEN }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $MONOREPO_PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/RokctAI/RokctAI_frontend/dispatches \
            -d '{"event_type":"schema_updated"}'

