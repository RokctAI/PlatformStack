name: Build (Smart)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIP_BREAK_SYSTEM_PACKAGES: 1
  NODE_OPTIONS: "--no-deprecation"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
  schedule:
    - cron: '0 2 * * 0' # Every Sunday at 2 AM UTC
  workflow_dispatch:
    inputs:
      backfill_ai_notes_cutoff_version:
        type: string
        default: ""
        description: "Regenerate AI release notes starting from this version (use 'all' for full history)"

      build-type:
        description: 'Build Type (apk/appbundle) - Ignored for Node'
        required: true
        default: 'apk'
        type: choice
        options:
        - apk
        - appbundle
      node-version:
        type: string
        default: '24'
      python-version:
        type: string
        default: '3.14.2'
      mariadb-version:
        type: string
        default: '10.6'
      postgres-version:
        type: string
        default: '16'
      install-rpanel:
        type: boolean
        default: false
      db-type:
        type: string
        default: 'postgres'
      version_format:
        type: string
        default: '##.##.#'
        description: "Format for version bumping (e.g. ##.##.## or ##.##.#)"

jobs:
  # --- 1. DETECT PROJECT TYPE & UPSTREAM UPDATES ---
  detect:
    runs-on: ubuntu-latest
    container: python:3.14-slim
    outputs:
      is_flutter: ${{ steps.check.outputs.is_flutter }}
      is_node: ${{ steps.check.outputs.is_node }}
      should_build: ${{ steps.upstream_check.outputs.should_build }}
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git curl jq
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/checkout@v4
      
      - name: Check Upstream Updates (Cron Only)
        id: upstream_check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Dynamically fetch the definitive ecosystem app list from the control repo
          echo "Fetching major_versions.json from RokctAI/control..."
          JSON_DATA=$(curl -s -H "Authorization: token ${{ secrets.MONOREPO_PAT || secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/RokctAI/control/contents/control/control/major_versions.json")
          
          # Parse the JSON to get a list of "Owner/Repo:Branch" (e.g., Frappenize/hrms:rokct). If no branch, it leaves it empty.
          if ! echo "$JSON_DATA" | jq -e . > /dev/null 2>&1; then
            echo "Failed to fetch or parse major_versions.json! Falling back to safe build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          REPOS=$(echo "$JSON_DATA" | jq -r 'to_entries | map(.value.owner + "/" + .key + ":" + (.value.branch // "")) | join(" ")')
          # Always include the orchestrator repo itself
          REPOS="$REPOS RokctAI/PlatformStack:"
          
          SHOULD_BUILD="false"
          
          # Look back 7 days (the cron interval)
          WEEK_AGO=$(date -d "7 days ago" -Iseconds | sed 's/+/%2B/g')
          
          for repo_info in $REPOS; do
            repo="${repo_info%%:*}"
            branch="${repo_info##*:}"
            
            # Explicitly exclude the ROK agent repository
            if [[ "$repo" == *"ROK"* ]] || [[ "$repo" == *"rok"* && "$repo" != *"rokct"* ]]; then
              continue
            fi
            
            QUERY="since=$WEEK_AGO&per_page=1"
            if [ -n "$branch" ]; then
              QUERY="$QUERY&sha=$branch"
              echo "Checking $repo (Branch: $branch) for commits since $WEEK_AGO..."
            else
              echo "Checking $repo (Default Branch) for commits since $WEEK_AGO..."
            fi
            
            # Check the GitHub API
            COMMITS=$(curl -s -H "Authorization: token ${{ secrets.MONOREPO_PAT || secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/$repo/commits?$QUERY")
            
            if echo "$COMMITS" | jq -e '.[0].sha' > /dev/null 2>&1; then
              echo "Updates found in $repo!"
              SHOULD_BUILD="true"
              break
            fi
          done
          
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          if [ "$SHOULD_BUILD" = "false" ]; then
            echo "No upstream updates found in the last 7 days. Pipeline will safely skip."
          fi

      - name: Check Project Type
        id: check
        if: steps.upstream_check.outputs.should_build == 'true'
        run: |
          if [ -f "pubspec.yaml" ]; then
             echo "Flutter project detected."
             echo "is_flutter=true" >> "$GITHUB_OUTPUT"
             echo "is_node=false" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
             echo "Node.js project detected."
             echo "is_flutter=false" >> "$GITHUB_OUTPUT"
             echo "is_node=true" >> "$GITHUB_OUTPUT"
          else
             echo "Unknown project type. Assuming Frappe."
             echo "is_flutter=false" >> "$GITHUB_OUTPUT"
             echo "is_node=false" >> "$GITHUB_OUTPUT"
          fi

  # --- 2. UNIFIED PIPELINE (Smart) ---
  pipeline:
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    uses: RokctAI/shared-workflows/.github/workflows/universal-pipeline.yml@main
    with:
      backfill_ai_notes_cutoff_version: ${{ inputs.backfill_ai_notes_cutoff_version }}
      project_type: ${{ needs.detect.outputs.is_flutter == 'true' && 'flutter' || (needs.detect.outputs.is_node == 'true' && 'node' || 'frappe') }}
      install-rpanel: true
      install-erpnext: true
      install-payments: true
      # Quality Gate Toggles
      run_security: true
      run_lint: true
      run_ci: false
      # Deployment Configuration (Immediate release on Main)
      release_strategy: 'weekly'
      # Environment configuration
      node-version: ${{ inputs.node-version || '24' }}
      python-version: ${{ inputs.python-version || '3.14.2' }}
      mariadb-version: ${{ inputs.mariadb-version || '10.6' }}
      postgres-version: ${{ inputs.postgres-version || '16' }}
      db-type: 'postgres'
      version_format: ${{ inputs.version_format || '##.##.##' }}
      bootstrap: true
      # --- Credentials ---
      # For Golden Seed generation: Ensures CI DB password matches Monorepo .env/production.env
    secrets: inherit

  docker-release:
    needs: pipeline
    if: success() && startsWith(github.repository, 'RokctAI/')
    runs-on: ubuntu-latest
    permissions: write-all
    services:
      db:
        image: ghcr.io/rokctai/monorepo/rpanel-db:latest
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.MONOREPO_PAT }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: admin
          POSTGRES_USER: postgres
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git rsync
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
           path: docker-context

      - name: Checkout Monorepo for Overrides
        if: github.repository_owner == 'RokctAI'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: RokctAI/Monorepo
          path: docker-context/monorepo_overrides
          token: ${{ secrets.MONOREPO_PAT || github.token }}



      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MONOREPO_PAT }}

      - name: Build Context Staging
        run: |
          # Copy the current repository's code (the code being tested) into the docker context
          # Exclude the docker-context folder itself to avoid recursion
          rsync -a --exclude 'docker-context' . ./docker-context/current_repo/

      - name: Extract Version
        id: meta
        run: |
          if [ -f "docker-context/version.json" ]; then
            VERSION=$(grep -E '"(platform|rpanel)"' docker-context/version.json | head -n 1 | cut -d'"' -f4)
          elif [ -f "docker-context/rpanel/versions.json" ]; then
            VERSION=$(grep '"rpanel"' docker-context/rpanel/versions.json | cut -d'"' -f4)
          else
            VERSION=$(grep "__version__" docker-context/rpanel/__init__.py | cut -d'"' -f2)
          fi
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version!"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extract version: $VERSION"

      - name: Confirm Database Readiness
        run: |
          timeout 30s bash -c "until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do echo 'Waiting for PostgreSQL...'; sleep 2; done"

      - name: Build and Push Control Hub (Full)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/platform/Dockerfile
          target: full
          network: host
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/rpanel-control:latest
            ghcr.io/rokctai/monorepo/rpanel-control:${{ steps.meta.outputs.version }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.MONOREPO_PAT || github.token }}
            IS_ROKCTAI_REPO=${{ github.repository_owner == 'RokctAI' && 'true' || 'false' }}
            DB_HOST=127.0.0.1

      - name: Build and Push Tenant Spoke (Tenant)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/platform/Dockerfile
          target: tenant
          network: host
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/rpanel-tenant:latest
            ghcr.io/rokctai/monorepo/rpanel-tenant:${{ steps.meta.outputs.version }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.MONOREPO_PAT || github.token }}
            IS_ROKCTAI_REPO=${{ github.repository_owner == 'RokctAI' && 'true' || 'false' }}
            DB_HOST=127.0.0.1

      - name: Build and Push Drone Brain (Frappe)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/platform/Dockerfile
          target: iot
          network: host
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/drone-brain:latest
            ghcr.io/rokctai/monorepo/drone-brain:${{ steps.meta.outputs.version }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.MONOREPO_PAT || github.token }}
            IS_ROKCTAI_REPO=${{ github.repository_owner == 'RokctAI' && 'true' || 'false' }}
            DB_HOST=127.0.0.1

      - name: Build and Push Drone Edge (Go)
        uses: docker/build-push-action@v4
        with:
          context: docker-context/monorepo_overrides/IoT
          file: docker-context/monorepo_overrides/IoT/Dockerfile
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/drone-edge:latest
            ghcr.io/rokctai/monorepo/drone-edge:${{ steps.meta.outputs.version }}

      - name: Build and Push Postgres (Custom)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/platform/postgres.Dockerfile
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/rpanel-db:latest
            ghcr.io/rokctai/monorepo/rpanel-db:${{ steps.meta.outputs.version }}

  upgrade-test:
    needs: [pipeline, docker-release]
    uses: RokctAI/shared-workflows/.github/workflows/universal-upgrade-test.yml@main
    with:
      current_version: ${{ needs.docker-release.outputs.version }}
    secrets: inherit

  rollback-images:
    needs: [docker-release, upgrade-test]
    # Only run if images were pushed successfully BUT the upgrade test failed
    if: always() && needs.docker-release.result == 'success' && needs.upgrade-test.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Failed Images from GHCR
        run: |
          VERSION="${{ needs.docker-release.outputs.version }}"
          echo "Rolling back failed version: $VERSION"
          
          # URL encoded package names
          PACKAGES=("monorepo%2Frpanel-control" "monorepo%2Frpanel-tenant" "monorepo%2Fdrone-brain" "monorepo%2Fdrone-edge" "monorepo%2Frpanel-db")
          
          for PKG in "${PACKAGES[@]}"; do
            echo "Looking up version ID for $PKG tag $VERSION..."
            VERSION_ID=$(curl -s -H "Authorization: token ${{ secrets.MONOREPO_PAT }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/orgs/RokctAI/packages/container/$PKG/versions" \
              | jq -r ".[] | select(.metadata.container.tags[]? == \"$VERSION\") | .id" | head -n 1)
            
            if [ -n "$VERSION_ID" ] && [ "$VERSION_ID" != "null" ]; then
              echo "Found ID $VERSION_ID. Issuing delete request..."
              RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE -H "Authorization: token ${{ secrets.MONOREPO_PAT }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/orgs/RokctAI/packages/container/$PKG/versions/$VERSION_ID")
              echo "Delete response code: $RESPONSE"
            else
              echo "Could not find tag $VERSION for package $PKG. It may have already been deleted or not pushed."
            fi
          done

  bump-version:
    needs: [docker-release, upgrade-test]
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MONOREPO_PAT || github.token }}
          
      - name: Auto-Bump Version
        run: |
          python3 -c "
          import json
          with open('version.json', 'r') as f:
              data = json.load(f)
          v = data.get('platform')
          if v:
              parts = v.split('.')
              parts[-1] = str(int(parts[-1]) + 1)
              data['platform'] = '.'.join(parts)
              with open('version.json', 'w') as f:
                  json.dump(data, f, indent=4)
                  f.write('\n')
          "
          
          git config --global user.name "rokctbot[bot]"
          git config --global user.email "rokctbot[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: auto-bump version [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${GITHUB_REF#refs/}
