
# RokctAI: IoT/Edge Spoke
# Optimized for low-RAM devices (Drones/Sensors)

services:
  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          memory: 64M
    volumes:
      - iot-redis-data:/data

  app:
    image: ghcr.io/rokctai/monorepo/drone-brain:latest
    environment:
      - MODE=iot
      - DB_TYPE=sqlite
      - SITE_NAME=${SITE_NAME:-drone.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    volumes:
      - iot-sites:/home/frappe/frappe-bench/sites
    depends_on:
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G # Reserve for AI processing but skip web overhead

volumes:
  iot-redis-data:
  iot-sites:
